<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAudio Test Dashboard</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        height: 100vh;
        background-color: #f4f4f9;
    }

    #sidebar {
        width: 320px;
        background-color: #293029;
        color: white;
        padding: 15px;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        overflow-y: auto;
    }

    h2 {
        font-size: 1.2rem;
        margin-bottom: 10px;
        color: #e70909;
        border-bottom: 1px solid #34495e;
        padding-bottom: 8px;
        text-align: center;
    }

    .url-card {
        display: block;
        width: 100%;
        border: none;
        text-align: left;
        background: #34495e;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s;
        color: white;
    }

    .url-card:hover { background: #27d847; }

    .url-card:focus {
        outline: 3px solid #1abc9c;
        background: #3e4f5f;
    }

    .url-name {
        font-weight: bold;
        display: block;
    }

    .url-link {
        font-size: 0.8rem;
        color: #bdc3c7;
    }

    #viewer {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        color: #555;
    }
</style>

</head>

<div id="viewer">
    Use TAB → ENTER to launch tests (Check console for logs)
</div>

<script>
    const STREAM_BASE_URL = window.AppConfig.STREAM_BASE_URL;

    function logInfo(message, data = {}) {
        console.log(`[WebAudioTest][INFO] ${new Date().toISOString()} - ${message}`, data);
    }

    function logWarn(message, data = {}) {
        console.warn(`[WebAudioTest][WARN] ${new Date().toISOString()} - ${message}`, data);
    }

    function logError(message, data = {}) {
        console.error(`[WebAudioTest][ERROR] ${new Date().toISOString()} - ${message}`, data);
    }

    document.addEventListener("DOMContentLoaded", () => {
        logInfo("Dashboard Loaded");

        const cards = document.querySelectorAll('.url-card');

        cards.forEach(card => {

            card.addEventListener('click', () => {
                handleNavigation(card);
            });

            card.addEventListener('keydown', (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    handleNavigation(card);
                }
            });
        });
    });

    function handleNavigation(card) {
    try {
        let baseUrl = card.getAttribute('data-url');

        if (!baseUrl) {
            logError("Missing data-url attribute");
            return;
        }

        let params = [];

        // Handle single stream (existing case)
        const streamKey = card.getAttribute('data-stream-key');

        if (streamKey) {
            const streamFile = window.AppConfig.streams[streamKey];

            if (!streamFile) {
                logWarn("Invalid stream key", { streamKey });
            } else {
                const full = STREAM_BASE_URL + streamFile;
                params.push("streamUrl=" + encodeURIComponent(full));
            }
        }

        // Handle video
        const videoKey = card.getAttribute('data-video-key');
        if (videoKey) {
            const videoFile = window.AppConfig.videos[videoKey];
            const full = STREAM_BASE_URL + videoFile;
            params.push("videoUrl=" + encodeURIComponent(full));
        }

        // Handle audio
        const audioKey = card.getAttribute('data-audio-key');
        if (audioKey) {
            const audioFile = window.AppConfig.streams[audioKey];
            const full = STREAM_BASE_URL + audioFile;
            params.push("audioUrl=" + encodeURIComponent(full));
        }

        // Build final URL
        let finalUrl = baseUrl;
        if (params.length > 0) {
            finalUrl += "?" + params.join("&");
        }

        logInfo("Navigating with params", { finalUrl });

        window.location.href = finalUrl;

    } catch (error) {
        logError("Navigation failed", { error: error.message });
    }
}
</script>

</html>
